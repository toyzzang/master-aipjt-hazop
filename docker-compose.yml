services:
  postgres:
    image: postgres:16
    container_name: hazop-poc-postgres
    environment:
      POSTGRES_DB: hazop_poc
      POSTGRES_USER: hazop
      POSTGRES_PASSWORD: hazop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hazop -d hazop_poc"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: hazop-poc-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://hazop:hazop@postgres:5432/hazop_poc
      KOSHA_MSDS_BASE_URL: ${KOSHA_MSDS_BASE_URL:-https://msds.kosha.or.kr}
      AGENT_LOG_DELAY_SECONDS: ${AGENT_LOG_DELAY_SECONDS:-1.0}
      AGENT_LLM_HEARTBEAT_SECONDS: ${AGENT_LLM_HEARTBEAT_SECONDS:-2.0}
    ports:
      - "8501:8000"
    volumes:
      - ./data:/app/data
      - ./samples:/app/samples
volumes:
  postgres-data:
